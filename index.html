<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background: #000;
      }
      /* * {
            outline: 1px solid rgba(255, 0, 0, 0.336);
        } */
      .hero {
        overflow: hidden;

        div {
          position: relative;
          z-index: 1;
        }
      }
      .hero::before {
        content: "";
        z-index: 0;
        inset: 0;
        background: linear-gradient(359deg, #000000a6 20%, transparent 30%);
        position: absolute;
        user-select: none;
      }
      .hero video {
        position: absolute;
        width: 67%;
        height: 53%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        transform-origin: center;
        background: black;
        z-index: -2;
        animation: scaleUp2 20s linear infinite;
      }
      .hero::after {
        content: "";
        position: absolute;
        z-index: -1;
        user-select: none;
        background-image: url(/images/theaterbackground.png);
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        background-size: contain;
        background-position: top;
        animation: scaleUp 20s linear infinite;
      }

      @keyframes scaleUp {
        0% {
          scale: 1;
        }
        100% {
          scale: 1.6;
        }
      }
      @keyframes scaleUp2 {
        0% {
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          transform: translate(-50%, -50%) scale(1.6);
        }
      }
    </style>
  </head>
  <body>
    <section
      class=" hero w-screen h-screen text-white grid grid-cols-2 md:grid-cols-6 contain-inline-size items-end p-4 md:p-6 gap-2 md:gap-4 bg-cover relative"
    >
      <video autoplay muted loop playsinline preload="metadata" width="100%">
        <source src="/images/bgvideo.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div class="col-span-full text-end">
        <a href="#" class="px-8 py-4 border border-white rounded-full"
          >Contact</a
        >
      </div>
      <div class="pt-5 border-t border-white h-fit">
        <h3 class="font-medium text-2xl">Just one chapter</h3>
        <p class="text-xl">U.S Air Force</p>
        <span class="text-xl opacity-50">Ze’ev Waisman</span>
      </div>
      <div class="pt-5 border-t border-white h-fit">
        <h3 class="font-medium text-2xl">Just one chapter</h3>
        <p class="text-xl">U.S Air Force</p>
        <span class="text-xl opacity-50">Ze’ev Waisman</span>
      </div>
      <div class="col-span-2 h-fit text-white">
        <h1 class="text-[8cqw] -ml-3" style="line-height: 1">Element4</h1>
      </div>

        <p class="text-xl">U.S Air Force</p>

      </div>

  </body>
</html>
